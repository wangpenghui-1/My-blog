<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <style>
    .title { font-size: 34px; font-weight: 700; fill: #1F2937; }
    .subtitle { font-size: 21px; font-weight: 400; fill: #64748B; }
    .th { font-size: 25px; font-weight: 700; fill: #1F2937; }
    .t { font-size: 22px; font-weight: 500; fill: #334155; }
    .ts { font-size: 19px; font-weight: 400; fill: #475569; }
    .caption { font-size: 18px; font-weight: 400; fill: #64748B; font-style: italic; }
    .box { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 2; }
    .blue { fill: #E6F1FB; stroke: #185FA5; }
    .teal { fill: #E1F5EE; stroke: #0F6E56; }
    .purple { fill: #EEEDFE; stroke: #534AB7; }
    .coral { fill: #FAECE7; stroke: #993C1D; }
    .amber { fill: #FAEEDA; stroke: #854F0B; }
    .green { fill: #EAF3DE; stroke: #3B6D11; }
    .gray { fill: #F1EFE8; stroke: #5F5E5A; }
    .arr { fill: none; stroke: #64748B; stroke-width: 3; }
    .arr-blue { fill: none; stroke: #185FA5; stroke-width: 3; }
    .arr-teal { fill: none; stroke: #0F6E56; stroke-width: 3; }
    .arr-purple { fill: none; stroke: #534AB7; stroke-width: 3; }
    .arr-coral { fill: none; stroke: #993C1D; stroke-width: 3; }
    .arr-amber { fill: none; stroke: #854F0B; stroke-width: 3; }
    .arr-green { fill: none; stroke: #3B6D11; stroke-width: 3; }
    .dash { stroke-dasharray: 10 8; }
    @media (prefers-color-scheme: dark) {
      .title,.th { fill:#F8FAFC; } .subtitle,.caption,.ts { fill:#CBD5E1; } .t { fill:#E2E8F0; }
      .box { fill:#1E293B; stroke:#64748B; }
      .blue { fill:#0C447C; stroke:#85B7EB; } .teal { fill:#085041; stroke:#5DCAA5; }
      .purple { fill:#3C3489; stroke:#AFA9EC; } .coral { fill:#712B13; stroke:#F0997B; }
      .amber { fill:#633806; stroke:#EF9F27; } .green { fill:#27500A; stroke:#97C459; }
      .gray { fill:#334155; stroke:#94A3B8; }
      .arr { stroke:#CBD5E1; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="context-stroke"/>
    </marker>
  </defs>

  <rect class="box" x="42" y="32" width="1116" height="610" rx="28"/>
  <text class="title" x="600" y="82" text-anchor="middle">从图像生成到视频创作的一体化生产链</text>
  <text class="subtitle" x="600" y="118" text-anchor="middle">图像设定 → 视频镜头 → 音画同步 → 剪辑分发，真正竞争的是工作流</text>

  <rect class="coral" x="80" y="170" width="260" height="105" rx="22" stroke-width="3"/>
  <text class="th" x="210" y="210" text-anchor="middle">概念 / 脚本</text>
  <text class="ts" x="210" y="242" text-anchor="middle">idea · prompt · storyboard</text>
  <path d="M340 222 L420 222" class="arr" marker-end="url(#arrow)"/>

  <rect class="teal" x="420" y="170" width="260" height="105" rx="22" stroke-width="3"/>
  <text class="th" x="550" y="210" text-anchor="middle">角色与关键帧</text>
  <text class="ts" x="550" y="242" text-anchor="middle">Nano Banana · GPT Image</text>
  <path d="M680 222 L760 222" class="arr" marker-end="url(#arrow)"/>

  <rect class="purple" x="760" y="170" width="360" height="105" rx="22" stroke-width="3"/>
  <text class="th" x="940" y="210" text-anchor="middle">图像生成 / 编辑</text>
  <text class="ts" x="940" y="242" text-anchor="middle">Midjourney · Flux · Firefly · ComfyUI</text>

  <path d="M940 275 L940 340 L210 340 L210 380" class="arr" marker-end="url(#arrow)"/>

  <rect class="blue" x="80" y="380" width="300" height="105" rx="22" stroke-width="3"/>
  <text class="th" x="230" y="420" text-anchor="middle">视频生成</text>
  <text class="ts" x="230" y="452" text-anchor="middle">Veo · Seedance · Runway · Kling</text>
  <path d="M380 432 L460 432" class="arr" marker-end="url(#arrow)"/>

  <rect class="amber" x="460" y="380" width="300" height="105" rx="22" stroke-width="3"/>
  <text class="th" x="610" y="420" text-anchor="middle">音画同步 / 多镜头</text>
  <text class="ts" x="610" y="452" text-anchor="middle">唇形同步 · 一致性 · 运镜控制</text>
  <path d="M760 432 L840 432" class="arr" marker-end="url(#arrow)"/>

  <rect class="green" x="840" y="380" width="280" height="105" rx="22" stroke-width="3"/>
  <text class="th" x="980" y="420" text-anchor="middle">剪辑与分发</text>
  <text class="ts" x="980" y="452" text-anchor="middle">Flow · CapCut · Shorts</text>

  <path d="M980 485 L980 555 L150 555 L150 275" class="arr-amber dash" marker-end="url(#arrow)"/>
  <text class="caption" x="600" y="585" text-anchor="middle">反馈循环：根据成片效果回到脚本、角色设定和关键帧继续迭代</text>

</svg>
