<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <style>
    .title { font-size: 34px; font-weight: 700; fill: #1F2937; }
    .subtitle { font-size: 21px; font-weight: 400; fill: #64748B; }
    .th { font-size: 25px; font-weight: 700; fill: #1F2937; }
    .t { font-size: 22px; font-weight: 500; fill: #334155; }
    .ts { font-size: 19px; font-weight: 400; fill: #475569; }
    .caption { font-size: 18px; font-weight: 400; fill: #64748B; font-style: italic; }
    .box { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 2; }
    .blue { fill: #E6F1FB; stroke: #185FA5; }
    .teal { fill: #E1F5EE; stroke: #0F6E56; }
    .purple { fill: #EEEDFE; stroke: #534AB7; }
    .coral { fill: #FAECE7; stroke: #993C1D; }
    .amber { fill: #FAEEDA; stroke: #854F0B; }
    .green { fill: #EAF3DE; stroke: #3B6D11; }
    .gray { fill: #F1EFE8; stroke: #5F5E5A; }
    .arr { fill: none; stroke: #64748B; stroke-width: 3; }
    .arr-blue { fill: none; stroke: #185FA5; stroke-width: 3; }
    .arr-teal { fill: none; stroke: #0F6E56; stroke-width: 3; }
    .arr-purple { fill: none; stroke: #534AB7; stroke-width: 3; }
    .arr-coral { fill: none; stroke: #993C1D; stroke-width: 3; }
    .arr-amber { fill: none; stroke: #854F0B; stroke-width: 3; }
    .arr-green { fill: none; stroke: #3B6D11; stroke-width: 3; }
    .dash { stroke-dasharray: 10 8; }
    @media (prefers-color-scheme: dark) {
      .title,.th { fill:#F8FAFC; } .subtitle,.caption,.ts { fill:#CBD5E1; } .t { fill:#E2E8F0; }
      .box { fill:#1E293B; stroke:#64748B; }
      .blue { fill:#0C447C; stroke:#85B7EB; } .teal { fill:#085041; stroke:#5DCAA5; }
      .purple { fill:#3C3489; stroke:#AFA9EC; } .coral { fill:#712B13; stroke:#F0997B; }
      .amber { fill:#633806; stroke:#EF9F27; } .green { fill:#27500A; stroke:#97C459; }
      .gray { fill:#334155; stroke:#94A3B8; }
      .arr { stroke:#CBD5E1; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="context-stroke"/>
    </marker>
  </defs>

  <rect class="box" x="42" y="32" width="1116" height="610" rx="28"/>
  <text class="title" x="600" y="82" text-anchor="middle">Agent 七层技术栈</text>
  <text class="subtitle" x="600" y="116" text-anchor="middle">Agent 不是更会聊天的机器人，而是可执行、可观测、可治理的软件系统</text>
  <path d="M600 565 L600 158" class="arr-blue" marker-end="url(#arrow)"/>
  <rect class="gray" x="160" y="145" width="880" height="56" rx="16" stroke-width="3"/>
  <text class="th" x="600" y="169" text-anchor="middle">基础模型</text>
  <text class="ts" x="600" y="193" text-anchor="middle">GPT / Claude / Gemini / Qwen / DeepSeek / Llama</text>
  <rect class="blue" x="160" y="209" width="880" height="56" rx="16" stroke-width="3"/>
  <text class="th" x="600" y="233" text-anchor="middle">工具与协议</text>
  <text class="ts" x="600" y="257" text-anchor="middle">MCP / A2A / OpenAPI / AP2 / UCP</text>
  <rect class="purple" x="160" y="273" width="880" height="56" rx="16" stroke-width="3"/>
  <text class="th" x="600" y="297" text-anchor="middle">编排框架</text>
  <text class="ts" x="600" y="321" text-anchor="middle">LangGraph / Agents SDK / Google ADK / AutoGen / Dify / n8n</text>
  <rect class="teal" x="160" y="337" width="880" height="56" rx="16" stroke-width="3"/>
  <text class="th" x="600" y="361" text-anchor="middle">记忆与状态</text>
  <text class="ts" x="600" y="385" text-anchor="middle">对话记忆 / 项目状态 / 知识库 / 数据库 / 事件日志</text>
  <rect class="coral" x="160" y="401" width="880" height="56" rx="16" stroke-width="3"/>
  <text class="th" x="600" y="425" text-anchor="middle">执行环境</text>
  <text class="ts" x="600" y="449" text-anchor="middle">沙箱 / 浏览器 / 虚拟机 / 容器 / 桌面 / 机器人</text>
  <rect class="amber" x="160" y="465" width="880" height="56" rx="16" stroke-width="3"/>
  <text class="th" x="600" y="489" text-anchor="middle">观测、评估与治理</text>
  <text class="ts" x="600" y="513" text-anchor="middle">Tracing / Evals / 回放 / 权限审计 / 人类审批</text>
  <rect class="green" x="160" y="529" width="880" height="56" rx="16" stroke-width="3"/>
  <text class="th" x="600" y="553" text-anchor="middle">业务应用层</text>
  <text class="ts" x="600" y="577" text-anchor="middle">客服 / 销售 / 研究 / 编程 / 财务 / 法务 / 数据分析</text>

  <rect class="blue" x="225" y="595" width="750" height="34" rx="12" stroke-width="2"/>
  <text class="ts" x="600" y="619" text-anchor="middle">公式：模型推理 + 工具调用 + 状态记忆 + 执行环境 + 权限评估</text>

</svg>
