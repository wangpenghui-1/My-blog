<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <style>
    .title { font-size: 34px; font-weight: 700; fill: #1F2937; }
    .subtitle { font-size: 21px; font-weight: 400; fill: #64748B; }
    .th { font-size: 25px; font-weight: 700; fill: #1F2937; }
    .t { font-size: 22px; font-weight: 500; fill: #334155; }
    .ts { font-size: 19px; font-weight: 400; fill: #475569; }
    .caption { font-size: 18px; font-weight: 400; fill: #64748B; font-style: italic; }
    .box { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 2; }
    .blue { fill: #E6F1FB; stroke: #185FA5; }
    .teal { fill: #E1F5EE; stroke: #0F6E56; }
    .purple { fill: #EEEDFE; stroke: #534AB7; }
    .coral { fill: #FAECE7; stroke: #993C1D; }
    .amber { fill: #FAEEDA; stroke: #854F0B; }
    .green { fill: #EAF3DE; stroke: #3B6D11; }
    .gray { fill: #F1EFE8; stroke: #5F5E5A; }
    .arr { fill: none; stroke: #64748B; stroke-width: 3; }
    .arr-blue { fill: none; stroke: #185FA5; stroke-width: 3; }
    .arr-teal { fill: none; stroke: #0F6E56; stroke-width: 3; }
    .arr-purple { fill: none; stroke: #534AB7; stroke-width: 3; }
    .arr-coral { fill: none; stroke: #993C1D; stroke-width: 3; }
    .arr-amber { fill: none; stroke: #854F0B; stroke-width: 3; }
    .arr-green { fill: none; stroke: #3B6D11; stroke-width: 3; }
    .dash { stroke-dasharray: 10 8; }
    @media (prefers-color-scheme: dark) {
      .title,.th { fill:#F8FAFC; } .subtitle,.caption,.ts { fill:#CBD5E1; } .t { fill:#E2E8F0; }
      .box { fill:#1E293B; stroke:#64748B; }
      .blue { fill:#0C447C; stroke:#85B7EB; } .teal { fill:#085041; stroke:#5DCAA5; }
      .purple { fill:#3C3489; stroke:#AFA9EC; } .coral { fill:#712B13; stroke:#F0997B; }
      .amber { fill:#633806; stroke:#EF9F27; } .green { fill:#27500A; stroke:#97C459; }
      .gray { fill:#334155; stroke:#94A3B8; }
      .arr { stroke:#CBD5E1; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="context-stroke"/>
    </marker>
  </defs>

  <rect class="box" x="42" y="32" width="1116" height="610" rx="28"/>
  <text class="title" x="600" y="82" text-anchor="middle">Physical AI 与人形机器人产业栈</text>
  <text class="subtitle" x="600" y="118" text-anchor="middle">世界模型、仿真训练、机器人本体与真实场景数据共同决定落地速度</text>

  <rect class="gray" x="120" y="500" width="660" height="64" rx="16" stroke-width="3"/>
  <text class="th" x="450" y="525" text-anchor="middle">端侧算力与硬件</text>
  <text class="ts" x="450" y="552" text-anchor="middle">Jetson Thor · sensors · batteries · actuators</text>

  <rect class="blue" x="120" y="416" width="660" height="64" rx="16" stroke-width="3"/>
  <text class="th" x="450" y="441" text-anchor="middle">仿真与世界模型</text>
  <text class="ts" x="450" y="468" text-anchor="middle">NVIDIA Isaac · Cosmos · GR00T · digital twin</text>

  <rect class="purple" x="120" y="332" width="660" height="64" rx="16" stroke-width="3"/>
  <text class="th" x="450" y="357" text-anchor="middle">机器人本体</text>
  <text class="ts" x="450" y="384" text-anchor="middle">Tesla Optimus · Figure 02 · Atlas · Unitree · Agibot</text>

  <rect class="teal" x="120" y="248" width="660" height="64" rx="16" stroke-width="3"/>
  <text class="th" x="450" y="273" text-anchor="middle">技能学习与控制</text>
  <text class="ts" x="450" y="300" text-anchor="middle">locomotion · manipulation · VLA · safety policy</text>

  <rect class="green" x="120" y="164" width="660" height="64" rx="16" stroke-width="3"/>
  <text class="th" x="450" y="189" text-anchor="middle">场景落地</text>
  <text class="ts" x="450" y="216" text-anchor="middle">工厂 · 仓储 · 巡检 · 危险作业 · 家庭服务</text>

  <path d="M450 500 L450 480" class="arr-blue" marker-end="url(#arrow)"/>
  <path d="M450 416 L450 396" class="arr-blue" marker-end="url(#arrow)"/>
  <path d="M450 332 L450 312" class="arr-blue" marker-end="url(#arrow)"/>
  <path d="M450 248 L450 228" class="arr-blue" marker-end="url(#arrow)"/>

  <rect class="amber" x="845" y="180" width="230" height="330" rx="22" stroke-width="3"/>
  <text class="th" x="960" y="222" text-anchor="middle">关键指标</text>
  <text class="t" x="960" y="274" text-anchor="middle">连续工作小时数</text>
  <text class="t" x="960" y="322" text-anchor="middle">MTBF</text>
  <text class="t" x="960" y="370" text-anchor="middle">单任务成本</text>
  <text class="t" x="960" y="418" text-anchor="middle">部署数量</text>
  <text class="t" x="960" y="466" text-anchor="middle">安全事故率</text>
  <path d="M780 196 L845 245" class="arr-amber" marker-end="url(#arrow)"/>
  <path d="M780 532 L845 455" class="arr-amber" marker-end="url(#arrow)"/>

</svg>
